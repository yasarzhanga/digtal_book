name: Verify Demo

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  verify-demo:
    name: npm run verify:demo
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: "true"
      DEMO_MODE: "true"
      NEXT_TELEMETRY_DISABLED: "1"
      SESSION_SECRET: github-actions-demo-session-secret-32
      DATABASE_PATH: storage/demo.sqlite
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "25"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Verify demo
        run: npm run verify:demo

      - name: Upload verification artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: demo-verification
          path: |
            artifacts/demo-verification
            playwright-report
            test-results
          if-no-files-found: ignore
